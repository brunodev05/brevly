version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: brevly-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: brevly
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: brevly-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/brevly
      FRONTEND_URL: http://localhost
      PORT: '3333'
      CLOUDFLARE_ACCOUNT_ID: ''
      CLOUDFLARE_ACCESS_KEY_ID: ''
      CLOUDFLARE_SECRET_ACCESS_KEY: ''
      CLOUDFLARE_BUCKET: ''
      CLOUDFLARE_PUBLIC_URL: ''
    ports:
      - '3333:3333'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3333/api/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: brevly-web
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - '80:80'

volumes:
  postgres_data:
